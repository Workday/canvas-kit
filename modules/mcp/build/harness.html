<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas Kit Story</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial,
          sans-serif;
        font-size: 14px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: var(--color-background-primary, #ffffff);
        color: var(--color-text-primary, #333333);
        zoom: 65%;
      }
      #root {
        padding: 24px;
        overflow: auto;
      }
      #root h1 {
        font-size: 2rem;
        font-weight: 700;
        margin: 0 0 0.5rem;
        line-height: 1.2;
      }
      #root h2 {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 2rem 0 0.75rem;
        padding-bottom: 0.25rem;
        border-bottom: 1px solid #e8e8e8;
        line-height: 1.3;
      }
      #root h3 {
        font-size: 1.17rem;
        font-weight: 700;
        margin: 1.5rem 0 0.5rem;
        line-height: 1.3;
      }
      #root h4,
      #root h5,
      #root h6 {
        font-weight: 700;
        margin: 1.25rem 0 0.5rem;
        line-height: 1.4;
      }
      #root p {
        margin: 0.75rem 0;
      }
      #root a {
        color: #0875e1;
        text-decoration: none;
      }
      #root a:hover {
        text-decoration: underline;
      }
      #root code {
        font-family: 'Roboto Mono', ui-monospace, Menlo, Monaco, 'Courier New', monospace;
        font-size: 0.85em;
        padding: 0.15em 0.4em;
        background: rgba(0, 0, 0, 0.05);
        color: rgba(43, 43, 43, 0.9);
        border-radius: 3px;
      }
      #root pre {
        font-family: 'Roboto Mono', ui-monospace, Menlo, Monaco, 'Courier New', monospace;
        font-size: 13px;
        line-height: 1.5;
        padding: 1rem;
        margin: 1rem 0;
        background: #f7f7f7;
        border-radius: 6px;
        overflow-x: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
      }
      #root pre code {
        padding: 0;
        background: none;
        font-size: inherit;
      }
      #root blockquote {
        margin: 1rem 0;
        padding: 0.75rem 1rem;
        border-left: 4px solid #0875e1;
        background: #f0f6ff;
        border-radius: 0 4px 4px 0;
      }
      #root blockquote p {
        margin: 0.25rem 0;
      }
      #root ul,
      #root ol {
        margin: 0.75rem 0;
        padding-left: 1.5rem;
      }
      #root li {
        margin: 0.25rem 0;
      }
      #root table {
        width: 100%;
        border-collapse: collapse;
        margin: 1rem 0;
        font-size: 0.9em;
      }
      #root th,
      #root td {
        padding: 0.5rem 0.75rem;
        border: 1px solid #e0e0e0;
        text-align: left;
      }
      #root th {
        background: #f5f5f5;
        font-weight: 500;
      }
      #root hr {
        border: none;
        border-top: 1px solid #e0e0e0;
        margin: 1.5rem 0;
      }
      #root img {
        max-width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- App entry is injected by Vite build -->
  </body>
</html>
