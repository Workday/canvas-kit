<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link
      rel="preload"
      href="https://design.workdaycdn.com/beta/assets/fonts@1.0.0/roboto/ttf/Roboto-Light.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="preload"
      href="https://design.workdaycdn.com/beta/assets/fonts@1.0.0/roboto/ttf/Roboto-Regular.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="preload"
      href="https://design.workdaycdn.com/beta/assets/fonts@1.0.0/roboto/ttf/Roboto-Medium.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="preload"
      href="https://design.workdaycdn.com/beta/assets/fonts@1.0.0/roboto/ttf/Roboto-Bold.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="preload"
      href="https://design.workdaycdn.com/beta/assets/fonts@1.0.0/roboto/ttf/RobotoMono-Regular.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <title>Components App</title>
  </head>
  <body>
    <!-- Font faces -->
    <style>
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 100 900;
        src: local('Inter'), url(Inter.ttf) format('truetype');
      }

      @font-face {
        font-family: 'Inter';
        font-style: italic;
        font-weight: 100 900;
        src: local('Inter-Italic'), url(Inter-Italic.ttf) format('truetype');
      }

      @font-face {
        font-family: 'Roboto Mono';
        font-style: normal;
        font-weight: 100 700;
        src: local('Roboto Mono'), local('Roboto-Mono'),
          url(Roboto-Mono.ttf) format('truetype');
      }

      /* Disable transitions for Cypress*/
      * {
        transition: none !important;
        animation-duration: 0s !important;
      }
      body {
        overflow: auto;
      }
    </style>
    <main data-cy-root></main>
  </body>
</html>
