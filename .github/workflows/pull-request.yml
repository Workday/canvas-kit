name: Pull Request

on:
  pull_request:
    # labeled: so Chromatic can run when "ready for review" is applied
    types: [opened, synchronize, reopened, labeled]

# Cancel in-progress runs for the same PR when a new commit is pushed.
# Avoids burning Chromatic snapshots (and CI minutes) on superseded commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # On labeled events, only continue when the Chromatic gate label was added —
  # other labels should not re-run the suite.
  install:
    if: github.event.action != 'labeled' || github.event.label.name == 'ready for review'
    runs-on: ubuntu-latest
    outputs:
      cypress-version: ${{ steps.cypress-version.outputs.version }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: Workday/canvas-kit-actions/install@v2
        with:
          node_version: 24.x

  check:
    if: github.event.action != 'labeled'
    runs-on: ubuntu-latest
    needs: 'install'

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: Workday/canvas-kit-actions/install@v2
        with:
          node_version: 24.x

      # Keep steps separate for Github Actions annotation matching: https://github.com/actions/setup-node/blob/83c9f7a7df54d6b57455f7c57ac414f2ae5fb8de/src/setup-node.ts#L26-L33
      - name: Lint
        run: yarn lint

      - name: Dependency Check
        run: yarn depcheck

      - name: Type Check
        run: yarn typecheck

      - name: Unit tests
        run: yarn test

  build:
    if: github.event.action != 'labeled' || github.event.label.name == 'ready for review'
    runs-on: ubuntu-latest
    needs: 'install'

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: Workday/canvas-kit-actions/install@v2
        with:
          node_version: 24.x

      - name: Build Storybook
        run: yarn build-storybook --quiet

      - name: Cache Build
        id: build-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: docs
          key: ${{ runner.os }}-build-${{ github.sha }}

  # Chromatic only when the PR is marked ready for review (and on later pushes
  # while that label remains). Skipped for draft/in-progress commits.
  visual-test:
    if: contains(github.event.pull_request.labels.*.name, 'ready for review')
    runs-on: ubuntu-latest
    needs: 'build'

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # Required to retrieve git history

      - uses: Workday/canvas-kit-actions/install@v2
        with:
          node_version: 24.x

      - name: Restore Build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: docs
          key: ${{ runner.os }}-build-${{ github.sha }}

      - uses: chromaui/action@94713c544284a14195de3b50ef24301579f1877e # main branch
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          projectToken: dlpro96xybh
          storybookBuildDir: docs
          exitOnceUploaded: false
          exitZeroOnChanges: true

  integration-test:
    if: github.event.action != 'labeled'
    runs-on: ubuntu-latest
    needs: ['install', 'build']
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3, 4, 5]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # Required to retrieve git history

      - uses: Workday/canvas-kit-actions/install@v2
        with:
          node_version: 24.x

      - name: Restore Build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: docs
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Integration tests
        run: yarn cypress run --component --record --parallel
        env:
          # Github Actions doesn't support encryption on forks
          # If these keys become compromised, we will rotate and disable these features
          # on forked PRs until a suitable workaround is found
          CYPRESS_RECORD_KEY: 3a9347b6-36ab-4a36-823d-709f4078b148
          CYPRESS_CACHE_FOLDER: .cache/cypress

  verify:
    runs-on: ubuntu-latest
    if: always()
    needs: ['check', 'integration-test', 'visual-test']
    steps:
      - name: Failure Test
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') # Test the result of all dependencies
        run: exit 1
      - name: Success
        run: exit 0
